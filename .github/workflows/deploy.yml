name: Deploy Homelab i5

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Testes de Sanidade (Lint/Unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar e Rodar Frontend
        run: |
          npm install
          npm test

      - name: Instalar e Rodar Backend
        run: |
          cd server
          npm install
          npm test

  ai-validation:
    name: Validação da Inteligência Artificial
    runs-on: ubuntu-latest
    needs: test # Só roda se os testes de sanidade passarem
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Dependências Backend
        run: |
          cd server
          npm install

      - name: Validar Conexão com Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd server
          npm test ai.test.js

  deploy:
    name: Deploy para Homelab
    runs-on: ubuntu-latest
    needs: ai-validation # Só executa se a IA estiver respondendo corretamente
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Conectar na Rede Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ephemeral: true

      - name: Executar Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: dyone
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dyone/controlefinanceiro
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
